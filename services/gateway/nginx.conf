server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        proxy_pass http://core-api:8001;
    }

    location ^~ /ui {
        proxy_pass http://core-api:8001;
    }

    location ^~ /v2/change-events {
        proxy_pass http://core-api:8001;
    }

    location ^~ /v2/timeline-events {
        proxy_pass http://core-api:8001;
    }

    location ^~ /v2/review-items {
        proxy_pass http://core-api:8001;
    }

    location ^~ /internal/v2/ingest-results {
        proxy_pass http://core-api:8001;
    }

    location ^~ /v2/input-sources {
        proxy_pass http://input-control-plane-api:8000;
    }

    location ^~ /v2/sync-requests {
        proxy_pass http://input-control-plane-api:8000;
    }

    location ^~ /v2/oauth-sessions {
        proxy_pass http://input-control-plane-api:8000;
    }

    location ^~ /v2/oauth-callbacks {
        proxy_pass http://input-control-plane-api:8000;
    }

    location ^~ /v2/webhook-events {
        proxy_pass http://input-control-plane-api:8000;
    }

    location ^~ /v2/users {
        proxy_pass http://input-control-plane-api:8000;
    }

    location ^~ /v2/onboarding {
        proxy_pass http://input-control-plane-api:8000;
    }

    location ^~ /internal/v2/ingest-jobs {
        proxy_pass http://input-control-plane-api:8000;
    }

    location / {
        proxy_pass http://core-api:8001;
    }
}
