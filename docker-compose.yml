services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: deadline_diff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deadline_diff"]
      interval: 5s
      timeout: 5s
      retries: 10

  input-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      APP_BASE_URL: http://localhost:8000
      SERVICE_NAME: input
      RUN_MIGRATIONS: "true"
      PORT: "8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/scripts/start_service.sh
    ports:
      - "8001:8000"

  ingest-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      INGESTION_TICK_SECONDS: "2"
      SERVICE_NAME: ingest
      RUN_MIGRATIONS: "true"
      PORT: "8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/scripts/start_service.sh

  review-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      REVIEW_APPLY_TICK_SECONDS: "2"
      SERVICE_NAME: review
      RUN_MIGRATIONS: "true"
      PORT: "8000"
      INPUT_API_BASE_URL: http://localhost:8001
      REVIEW_API_BASE_URL: http://localhost:8000
      INGEST_API_BASE_URL: ""
      NOTIFY_API_BASE_URL: ""
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/scripts/start_service.sh
    ports:
      - "8000:8000"

  notification-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      NOTIFICATION_TICK_SECONDS: "30"
      SERVICE_NAME: notification
      RUN_MIGRATIONS: "true"
      PORT: "8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/scripts/start_service.sh

volumes:
  pgdata:
