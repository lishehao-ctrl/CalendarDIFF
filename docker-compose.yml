services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: deadline_diff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deadline_diff"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  ingestion-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      INGESTION_TICK_SECONDS: "2"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -lc "alembic upgrade head && python -m services.ingestion_runtime.worker"

  notification-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      NOTIFICATION_TICK_SECONDS: "30"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -lc "alembic upgrade head && python -m services.notification.worker"

volumes:
  pgdata:
