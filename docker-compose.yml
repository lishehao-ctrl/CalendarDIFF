services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: deadline_diff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deadline_diff"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  public-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      APP_BASE_URL: http://localhost:8000
      SERVICE_NAME: public
      RUN_MIGRATIONS: "true"
      PORT: "8000"
    volumes:
      - ./:/app
      - ${HOST_SECRETS_DIR:-/tmp/calendardiff-secrets}:${HOST_SECRETS_DIR:-/tmp/calendardiff-secrets}:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/scripts/start_service.sh
    ports:
      - "8000:8000"

  input-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      APP_BASE_URL: http://localhost:8000
      SERVICE_NAME: input
      RUN_MIGRATIONS: "false"
      PORT: "8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/scripts/start_service.sh

  ingest-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      REDIS_URL: redis://redis:6379/0
      INGESTION_LLM_MODEL: ${INGESTION_LLM_MODEL:?INGESTION_LLM_MODEL is required for docker compose}
      INGESTION_LLM_BASE_URL: ${INGESTION_LLM_BASE_URL:?INGESTION_LLM_BASE_URL is required for docker compose}
      INGESTION_LLM_API_KEY: ${INGESTION_LLM_API_KEY:?INGESTION_LLM_API_KEY is required for docker compose}
      APP_LLM_OPENAI_MODEL: ${APP_LLM_OPENAI_MODEL:-}
      INGESTION_TICK_SECONDS: "2"
      SERVICE_NAME: ingest
      RUN_MIGRATIONS: "false"
      PORT: "8000"
    volumes:
      - ./:/app
      - ${HOST_SECRETS_DIR:-/tmp/calendardiff-secrets}:${HOST_SECRETS_DIR:-/tmp/calendardiff-secrets}:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/scripts/start_service.sh

  review-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      REVIEW_APPLY_TICK_SECONDS: "2"
      SERVICE_NAME: review
      RUN_MIGRATIONS: "false"
      PORT: "8000"
      REVIEW_API_BASE_URL: http://localhost:8000
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/scripts/start_service.sh

  notification-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      NOTIFICATION_TICK_SECONDS: "5"
      SERVICE_NAME: notification
      RUN_MIGRATIONS: "false"
      PORT: "8000"
      REVIEW_API_BASE_URL: http://public-service:8000
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/scripts/start_service.sh

  llm-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      REDIS_URL: redis://redis:6379/0
      INGESTION_LLM_MODEL: ${INGESTION_LLM_MODEL:?INGESTION_LLM_MODEL is required for docker compose}
      INGESTION_LLM_BASE_URL: ${INGESTION_LLM_BASE_URL:?INGESTION_LLM_BASE_URL is required for docker compose}
      INGESTION_LLM_API_KEY: ${INGESTION_LLM_API_KEY:?INGESTION_LLM_API_KEY is required for docker compose}
      APP_LLM_OPENAI_MODEL: ${APP_LLM_OPENAI_MODEL:-}
      SERVICE_NAME: llm
      RUN_MIGRATIONS: "false"
      PORT: "8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/scripts/start_service.sh

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_BASE_URL: http://public-service:8000
      BACKEND_API_KEY: ${APP_API_KEY}
    depends_on:
      public-service:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pgdata:
