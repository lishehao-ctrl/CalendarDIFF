services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: deadline_diff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deadline_diff"]
      interval: 5s
      timeout: 5s
      retries: 10

  input-control-plane-api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      DISABLE_SCHEDULER: "true"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -lc "alembic upgrade head && uvicorn services.input_control_plane.main:app --host 0.0.0.0 --port 8000"

  core-api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      DISABLE_SCHEDULER: "true"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -lc "alembic upgrade head && uvicorn services.core_api.main:app --host 0.0.0.0 --port 8001"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - input-control-plane-api
      - core-api
    ports:
      - "8000:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  ingestion-orchestrator:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      DISABLE_SCHEDULER: "true"
      ORCHESTRATOR_TICK_SECONDS: "3"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -lc "alembic upgrade head && python -m services.ingestion_orchestrator.worker"

  connector-runtime:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      DISABLE_SCHEDULER: "true"
      CONNECTOR_TICK_SECONDS: "2"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -lc "alembic upgrade head && python -m services.connector_runtime.worker"

  core-apply-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      DISABLE_SCHEDULER: "true"
      CORE_APPLY_TICK_SECONDS: "2"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -lc "alembic upgrade head && python -m services.core_apply_worker.worker"

volumes:
  pgdata:
