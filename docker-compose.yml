services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: deadline_diff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deadline_diff"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  public-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deadline_diff
      REDIS_URL: redis://redis:6379/0
      APP_BASE_URL: http://localhost:8000
      SERVICE_NAME: backend
      RUN_MIGRATIONS: "true"
      PORT: "8000"
    volumes:
      - ./:/app
      - ${HOST_SECRETS_DIR:-/tmp/calendardiff-secrets}:${HOST_SECRETS_DIR:-/tmp/calendardiff-secrets}:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/scripts/start_service.sh
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_BASE_URL: http://public-service:8000
      BACKEND_API_KEY: ${APP_API_KEY}
    depends_on:
      public-service:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pgdata:
